<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login – Sankalp Digital Pathshala</title>
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
    <style>
        /* Additional styles specific to admin login page */
        .admin-login-section {
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
        }
        .login-card h1 {
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .login-card .logo-center {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 600;
            color: #cbd5e1;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: #f8fcff;
            font-size: 1rem;
            transition: border 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #38BDF8;
            box-shadow: 0 0 10px rgba(56,189,248,0.4);
        }
        .login-error {
            color: #ef4444;
            text-align: center;
            margin-top: 0.5rem;
            display: none;
        }
        .back-home {
            text-align: center;
            margin-top: 1rem;
        }
        .back-home a {
            color: #7DD3FC;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav class="navbar glass" role="navigation" aria-label="Main navigation">
        <div class="nav-container">
            <a href="/" class="logo" aria-label="Sankalp Digital Pathshala Home">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 240 80' fill='none'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2338BDF8'/%3E%3Cstop offset='100%25' stop-color='%234F46E5'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x='10' y='55' font-family='Arial, sans-serif' font-weight='900' font-size='40' fill='url(%23grad)' letter-spacing='3'%3ESDP%3C/text%3E%3Ctext x='10' y='75' font-family='Arial, sans-serif' font-weight='600' font-size='14' fill='%2338BDF8' letter-spacing='5'%3EDIGITAL PATHSHALA%3C/text%3E%3C/svg%3E"
                     alt="Sankalp Digital Pathshala" width="160" height="50">
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/programs">Programs</a></li>
                <li><a href="/ai-learning">AI Learning</a></li>
                <li><a href="/results">Results</a></li>
                <li><a href="/gallery">Gallery</a></li>
                <li><a href="/events">Events</a></li>
                <li><a href="/sankalp-sathi">Sankalp Sathi</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
            <a href="https://wa.me/91XXXXXXXXXX" target="_blank" rel="noopener noreferrer" class="btn-whatsapp">💬 WhatsApp</a>
            <button class="hamburger" id="hamburger" aria-label="Toggle navigation menu">&#9776;</button>
        </div>
    </nav>

    <main>
        <section class="admin-login-section">
            <div class="login-card glass">
                <div class="logo-center">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 240 80' fill='none'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2338BDF8'/%3E%3Cstop offset='100%25' stop-color='%234F46E5'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x='10' y='55' font-family='Arial, sans-serif' font-weight='900' font-size='40' fill='url(%23grad)' letter-spacing='3'%3ESDP%3C/text%3E%3Ctext x='10' y='75' font-family='Arial, sans-serif' font-weight='600' font-size='14' fill='%2338BDF8' letter-spacing='5'%3EDIGITAL PATHSHALA%3C/text%3E%3C/svg%3E"
                         alt="Sankalp" width="160" height="50">
                </div>
                <h1 class="gradient-text">Admin Access</h1>
                <form id="adminLoginForm">
                    <div class="form-group">
                        <label for="adminEmail">Email</label>
                        <input type="email" id="adminEmail" placeholder="admin@sankalp.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="adminPassword">Password</label>
                        <input type="password" id="adminPassword" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-primary" style="width:100%;">Sign In</button>
                    <div class="login-error" id="loginError"></div>
                </form>
                <div class="back-home">
                    <a href="/">← Back to Home</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container" style="text-align:center; padding:1rem;">
            <p>&copy; 2026 Sankalp Digital Pathshala</p>
        </div>
    </footer>

    <script src="/assets/app.js"></script>
</body>
</html>
